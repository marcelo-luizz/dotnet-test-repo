name: CD PROD - Build, Push ECR & Deploy to EC2

# =============================================================
# 🚀 Aciona quando um PR é mergeado na branch main
# Faz build da imagem, push para o ECR e deploy na EC2
# =============================================================

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev/nautihub
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }} # Ex: 123456789012.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy-prod:
    name: 🚀 Build, Push & Deploy to PROD
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

