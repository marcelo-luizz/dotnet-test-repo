name: CD DEV - Deploy to Development

# =============================================================
# 🔔 Aciona quando um PR é mergeado na branch develop
# 
# SITUAÇÃO ATUAL: Não existe ambiente de DEV ainda.
# Este workflow apenas notifica o dev para abrir PR na main.
#
# FUTURO: Quando tiver ambiente de DEV, descomente os steps
# comentados abaixo para fazer build, push ECR e deploy na EC2.
# =============================================================

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: dev/nautihub
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }} # Ex: 123456789012.dkr.ecr.us-east-1.amazonaws.com

jobs:
  notify:
    name: 📢 Notify - Merge to Main
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: 📢 Aviso - Ambiente de DEV não disponível
        run: |
          echo "============================================================="
          echo "✅ PR mergeado na develop com sucesso!"
          echo ""
          echo "⚠️  Ambiente de DEV não está disponível no momento."
          echo ""
          echo "👉 Próximo passo: Abra um Pull Request de develop → main"
          echo "   para acionar o deploy em produção."
          echo ""
          echo "   Repositório: ${{ github.repository }}"
          echo "   Link: https://github.com/${{ github.repository }}/compare/main...develop"
          echo "============================================================="

  # =============================================================
  # 🚀 DEPLOY DEV (DESCOMENTADO QUANDO HOUVER AMBIENTE)
