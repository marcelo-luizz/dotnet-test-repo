name: CD - Build & Push to ECR

on:
  pull_request:
    branches:
      - develop
    types:
      - closed

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: sample-api

jobs:
  deploy:
    name: 🚀 Build & Push to ECR
    runs-on: ubuntu-latest
    # Só roda se o PR foi mergeado (não apenas fechado/cancelado)
    if: github.event.pull_request.merged == true

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name:  Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔐 Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
                        -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "✅ Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: 📋 Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY
          script: |
            # Login no ECR
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin ${{ steps.ecr-login.outputs.registry }}

            # Pull da nova imagem
            docker pull ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:latest

            # Stop/Remove container antigo
            docker stop sample-api 2>/dev/null || true
            docker rm sample-api 2>/dev/null || true

            # Start novo container
            docker run -d \
              --name sample-api \
              --restart unless-stopped \
              -p 8080:8080 \
              -e ASPNETCORE_ENVIRONMENT=Production \
              ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:latest

            # Cleanup
            docker image prune -f

            echo "✅ Deploy completed!"

            # Health check
            sleep 5
            curl -f http://localhost:8080/api/health || echo "⚠️ Health check failed"
